name: CI

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm test

  publish:
    name: Publish to npm
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write     # required for npm OIDC trusted publishing
      contents: write     # required for creating the GitHub release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Debug OIDC claim
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('npm:registry.npmjs.org')
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64').toString())
            core.info(JSON.stringify(payload, null, 2))

      - run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: boringtunjs ${{ github.ref_name }}
          generateReleaseNotes: true

  notify-success:
    needs: publish
    if: success() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Notify Telegram (Success)
        env:
          TELEGRAM_CHAT_CODE_ID: ${{ secrets.TELEGRAM_CHAT_CODE_ID }}
          TELEGRAM_BOT_TOKEN_DEV: ${{ secrets.TELEGRAM_BOT_TOKEN_DEV }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          MESSAGE="🎉 New release $REPO_NAME:$TAG_NAME"
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"$TELEGRAM_CHAT_CODE_ID\", \"text\": \"$MESSAGE\", \"disable_notification\": true}" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN_DEV/sendMessage"

  notify-failure:
    needs: [test, publish]
    if: failure() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Notify Telegram (Failure)
        env:
          TELEGRAM_CHAT_CODE_ID: ${{ secrets.TELEGRAM_CHAT_CODE_ID }}
          TELEGRAM_BOT_TOKEN_DEV: ${{ secrets.TELEGRAM_BOT_TOKEN_DEV }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          MESSAGE="❌ Failure in release $REPO_NAME:$TAG_NAME"
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"$TELEGRAM_CHAT_CODE_ID\", \"text\": \"$MESSAGE\", \"disable_notification\": true}" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN_DEV/sendMessage"
